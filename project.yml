name: IKEADeskController
options:
  bundleIdPrefix: com.alexandrustefan
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""

targets:
  IKEADeskController:
    type: application
    platform: macOS
    sources:
      - path: IKEADeskController
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.alexandrustefan.ikea-desk-controller
      PRODUCT_NAME: Stance
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Stance
      INFOPLIST_KEY_LSUIElement: YES
      INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Stance needs Bluetooth to connect to and control your sit-stand desk."
      INFOPLIST_KEY_NSBluetoothPeripheralUsageDescription: "Stance needs Bluetooth to connect to and control your sit-stand desk."
      INFOPLIST_KEY_NSPrincipalClass: NSApplication
      CODE_SIGN_ENTITLEMENTS: IKEADeskController/IKEADeskController.entitlements
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGNING_ALLOWED: YES
      ENABLE_HARDENED_RUNTIME: NO
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  IKEADeskControllerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: IKEADeskControllerTests
    dependencies:
      - target: IKEADeskController
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.alexandrustefan.ikea-desk-controller.tests
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGNING_REQUIRED: NO
      BUNDLE_LOADER: "$(TEST_HOST)"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Stance.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Stance"

schemes:
  IKEADeskController:
    build:
      targets:
        IKEADeskController: all
        IKEADeskControllerTests: [test]
    test:
      targets:
        - IKEADeskControllerTests
